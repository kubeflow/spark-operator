# Helm values to render output comparable to Kustomize defaults.
# Used by: make drift-check
#
# These values align the Helm template output with what kustomize build produces,
# so the drift detection script can perform an apples-to-apples comparison.

spark:
  jobNamespaces:
    - ""                # Cluster-wide: puts policyRules in ClusterRole (matches Kustomize)

hook:
  upgradeCrd: false     # Exclude CRD hook Job (not present in Kustomize)

certManager:
  enable: false         # Exclude cert-manager resources (not present in Kustomize)
