image:
  tag: local

# Configure spark jobs to run in:
# 1. "default" namespace explicitly (for core e2e tests)
# 2. Any namespace with "spark=enabled" label (for namespace filtering tests)
# This uses OR logic: namespace is watched if in list OR matches selector
spark:
  jobNamespaces:
    - default
  jobNamespaceSelector: "spark=enabled"

controller:
  kubeAPIQPS: 100
  kubeAPIBurst: 100
  driverPodDisruptionBudget:
    enable: true

webhook:
  kubeAPIQPS: 100
  kubeAPIBurst: 100
  # Enable URL-scheme validation so the e2e SSRF rejection/acceptance specs exercise it; the
  # feature is opt-in and off by default. No extra allowedSchemes: the specs only rely on the
  # always-allowed local schemes (file://) passing and http:// being rejected.
  urlSchemeValidation:
    enable: true
