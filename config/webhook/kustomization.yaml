apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - serviceaccount.yaml
  - clusterrole.yaml
  - clusterrolebinding.yaml
  - role.yaml
  - rolebinding.yaml
  - service.yaml
  - deployment.yaml
  - manifests.yaml

patches:
  - path: webhook-objectselector-patch.yaml

configurations:
  - kustomizeconfig.yaml

replacements:
  - source:
      kind: Service
      name: spark-operator-webhook-svc
      fieldPath: metadata.name
    targets:
      - select:
          kind: MutatingWebhookConfiguration
        fieldPaths:
          - webhooks.*.clientConfig.service.name
      - select:
          kind: ValidatingWebhookConfiguration
        fieldPaths:
          - webhooks.*.clientConfig.service.name
