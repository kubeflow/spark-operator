---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    api-approved.kubernetes.io: https://github.com/kubeflow/spark-operator/pull/1298
    controller-gen.kubebuilder.io/version: v0.17.1
  name: sparkclusters.sparkoperator.k8s.io
spec:
  group: sparkoperator.k8s.io
  names:
    kind: SparkCluster
    listKind: SparkClusterList
    plural: sparkclusters
    shortNames:
    - sparkcluster
    singular: sparkcluster
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    - jsonPath: .status.state
      name: Status
      type: string
    - jsonPath: .status.master.podName
      name: Master
      type: string
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: SparkCluster is the Schema for deploying Spark Standalone clusters
          on Kubernetes.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: SparkClusterSpec defines the desired state of SparkCluster.
            properties:
              image:
                description: |-
                  Image is the default container image for master and worker pods.
                  Can be overridden by pod templates.
                type: string
              master:
                description: Master is the Spark master specification.
                properties:
                  template:
                    description: Template is the pod template for the Spark master.
                    type: object
                    x-kubernetes-preserve-unknown-fields: true
                type: object
              sparkConf:
                additionalProperties:
                  type: string
                description: SparkConf carries user-specified Spark configuration
                  properties.
                type: object
              sparkVersion:
                description: SparkVersion is the version of Spark used by the cluster.
                type: string
              workerGroups:
                description: WorkerGroups defines groups of Spark workers with varying
                  configurations.
                items:
                  description: WorkerGroupSpec defines a group of Spark worker pods.
                  properties:
                    name:
                      description: Name is the name of this worker group. Must be
                        unique within a SparkCluster.
                      type: string
                    replicas:
                      default: 1
                      description: Replicas is the number of worker pods in this group.
                      format: int32
                      minimum: 0
                      type: integer
                    template:
                      description: Template is the pod template for workers in this
                        group.
                      type: object
                      x-kubernetes-preserve-unknown-fields: true
                  required:
                  - name
                  type: object
                type: array
            required:
            - master
            - sparkVersion
            type: object
          status:
            description: SparkClusterStatus defines the observed state of SparkCluster.
            properties:
              conditions:
                description: Represents the latest available observations of a SparkCluster's
                  current state.
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastUpdateTime:
                description: LastUpdateTime is the time at which the controller last
                  updated the SparkCluster.
                format: date-time
                type: string
              master:
                description: Master represents the current state of the master pod.
                properties:
                  podIp:
                    description: PodIP is the IP address of the master pod.
                    type: string
                  podName:
                    description: PodName is the name of the master pod.
                    type: string
                  serviceName:
                    description: ServiceName is the name of the master service.
                    type: string
                type: object
              startTime:
                description: StartTime is the time at which the controller started
                  processing the SparkCluster.
                format: date-time
                type: string
              state:
                description: State represents the current state of the SparkCluster.
                type: string
              workers:
                additionalProperties:
                  type: integer
                description: Workers contains the count of worker pods by phase.
                type: object
            type: object
        required:
        - metadata
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
