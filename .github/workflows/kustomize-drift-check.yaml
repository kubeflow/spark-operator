# Detect semantic drift between the Helm chart (source of truth) and Kustomize manifests.
# Compares RBAC rules, webhook configurations, and deployment specs.
name: Kustomize Drift Check

on:
  pull_request:
    branches:
      - master
      - release-*
    paths:
      - 'config/**'
      - 'charts/**'
      - 'internal/**'
      - 'test/drift/**'
      - '.github/workflows/kustomize-drift-check.yaml'

  push:
    branches:
      - master
      - release-*
    paths:
      - 'config/**'
      - 'charts/**'
      - 'internal/**'
      - 'test/drift/**'
      - '.github/workflows/kustomize-drift-check.yaml'

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.actor }}
  cancel-in-progress: true

jobs:
  drift-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0 # zizmor: ignore[cache-poisoning] caching is intentional for CI jobs
        with:
          go-version-file: go.mod

      - name: Run drift detection
        run: make drift-check
