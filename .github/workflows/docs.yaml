name: Documentation

# Builds and link-checks the documentation website on every change.
# This validates the docs in CI; publishing is handled separately by
# Read the Docs (see .readthedocs.yaml), not by this workflow.

on:
  pull_request:
    paths:
      - "docs/**"
      - ".readthedocs.yaml"
      - "Makefile"
      - ".github/workflows/docs.yaml"
  push:
    branches: [master]
    paths:
      - "docs/**"
      - ".readthedocs.yaml"
      - "Makefile"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build Documentation
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs/requirements.txt

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Build documentation (warnings treated as errors)
        run: make docs-test

      - name: Upload documentation artifact
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: documentation
          path: docs/_build/html
          retention-days: 7

  linkcheck:
    runs-on: ubuntu-latest
    name: Check Links
    # Non-blocking: external links can be flaky and should not fail the PR.
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: docs/requirements.txt

      - name: Install dependencies
        run: pip install -r docs/requirements.txt

      - name: Check links
        run: make docs-linkcheck
