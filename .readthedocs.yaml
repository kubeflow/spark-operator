# Read the Docs build configuration
# Kubeflow Spark Operator Documentation System
#
# The website lives under docs/website and its Python tooling is managed with uv.

version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.12"
  commands:
    - pip install uv
    - uv sync --directory docs/website --group docs
    - uv run --directory docs/website sphinx-build -b html . "$READTHEDOCS_OUTPUT/html"
